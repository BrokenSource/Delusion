name: release
on:
  workflow_dispatch:
  push:
    paths:
      - "version"

jobs:
  main:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - run:  echo "VERSION=$(cat version)" >> "$GITHUB_ENV"
      - run:  uv build --wheel
      - run:  uv publish
      - uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          files: dist/*.whl
