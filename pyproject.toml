[project]
name        = "delusion"
description = "✨ A minimal generative models router"
authors     = [{name="Tremeschin"}]
version     = "0.2.0"
readme      = "readme.md"
license     = "MIT"
requires-python = ">=3.10"
dependencies = [
    "cachetools",
    "ollama",
    "diskcache",
    "pydantic",
]

[project.urls]
GitHub = "https://github.com/BrokenSource/Delusion"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
