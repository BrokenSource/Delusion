[project]
name        = "delusion"
description = "✨ A minimal generative models router"
authors     = [{name="Tremeschin"}]
dynamic     = ["version"]
readme      = "readme.md"
license     = "MIT"
requires-python = ">=3.12"
dependencies = [
    "cachetools",
    "ollama",
    "diskcache",
    "pydantic",
]

[project.urls]
GitHub = "https://github.com/BrokenSource/Delusion"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
pattern = "(?P<version>.*)"
path = "version"
